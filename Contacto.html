<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/contacto.css">
    <title>Winebox - Contactos</title>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="img/logo-winebox.png" alt="Logo de Winebox">
            <strong>Winebox</strong>
        </div>
        <div>
            <a href="index.html">Inicio</a>
            <a href="categoria.html">Vinos</a>
            <a href="bodega.html">Bodegas</a>
            <a href="Contacto.html">Contacto</a>
            <a href="#newsletter">Newsletter</a>
        </div>
    </nav>
    
       
    
       <main>
        <section id="contacto">
            <div class="contact-card">
                <header class="header">
                    <h1>Contacto</h1>
                    <p>Los mejores vinos seleccionados para ti</p>
                </header>
                <form class="contact-form" method="POST" action="#">
                    <div class="form-group">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                    </div>

                    <div class="form-group form-radios">
                        <span>Calificar Atención:</span>
                        <label for="calificar_1"><input type="radio" name="calificar" id="calificar_1" value="1" required>Pésima</label>
                        <label for="calificar_2"><input type="radio" name="calificar" id="calificar_2" value="2">Aceptable</label>
                        <label for="calificar_3"><input type="radio" name="calificar" id="calificar_3" value="3">Buena</label>
                        <label for="calificar_4"><input type="radio" name="calificar" id="calificar_4" value="4">Excelente</label>
                    </div>

                    <button type="submit">Enviar Formulario</button>
                </form>
           </div>
        </section>
    </main>

    <footer style="background-color: rgb(114, 47, 55); color: white; text-align: center; padding: 20px; margin-bottom:0;">
        <p>&copy; 2026 Winebox. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
