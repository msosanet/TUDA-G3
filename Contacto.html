<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winebox - Contactos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: rgb(255, 255, 255);
            font-family: Arial, sans-serif;
            color: #333;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            justify-content: space-between;
        }
        header {
            background-color: rgb(114, 47, 55);     
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h2 {
            font-size: 2.5em;
            margin: 0;
            flex: 1;
        }
        nav {
            background-color: transparent;
            padding: 0;
            margin-left: 20px;
            display: flex;
            gap: 20px;
        }
        nav div {
            display: flex;
            gap: 20px;
        }
        a {
            color: white;
            text-align: right;
            margin: 0;
            font-weight: 500px;
            text-decoration: none;
        }
        nav a:hover {
            color: #D4AF37;
        }
        main {
            padding: 40px 20px;
            flex: 1;
        }
        #contacto {
          display:flex;
          justify-content:center;
          align-items:center; 
          margin: 0;

        }

    </style>
</head>
<body>
    
    <header>
        <div class="logo"><strong>Winebox</strong></div>
        <nav>
            <div>
                <a href="index.html">Inicio</a>
                <a href="categoria.html">Vinos</a>
                <a href="bodega.html">Bodegas</a>
                <a href="Contacto.html">Contacto</a>
            </div>
        </nav>
    </header>

        <section id="contacto">
            <div>
            <h2 style="text-align:center;">Contacto</h2>
             <p style="text-align:center">Los mejores vinos seleccionados para ti</p>
            <form method="POST" style="width: 500px; margin: 20px auto; padding: 24px; background-color: rgba(255, 255, 255, 0.9); border-radius: 10px;">
                <label for="nombre" style="display: block; margin-bottom: 5px; color: #333;">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #D4AF37; border-radius: 4px; box-sizing: border-box;">
                
                <label for="email" style="display: block; margin-bottom: 5px; color: #333;">Correo electrónico:</label>
                <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #D4AF37; border-radius: 4px; box-sizing: border-box;">
                
                <label for="mensaje" style="display: block; margin-bottom: 5px; color: #333;">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" required style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #D4AF37; border-radius: 4px; box-sizing: border-box; resize: vertical; max-height: 150px;"></textarea>
                
                <label for="opcion" style="display:block; margin-bottom: 5px; color: #333;">Calificar Atención:</label>
                <div style="margin-bottom:15px;">
                    <label><input type="radio" name="calificar" id="opcion" value="1" required>Pésima</label>
                    <label><input type="radio" name="calificar" id="opcion" value="2" required>Aceptable</label>
                    <label><input type="radio" name="calificar" id="opcion" value="3" required>Buena</label>
                    <label><input type="radio" name="calificar" id="opcion" value="4" required>Excelente</label>
                </div>
                <button type="submit" style="background-color: rgb(114, 47, 55); color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%;">Enviar mensaje</button>
                
            </form>
           </div> 
        </section>
    </main>

    <footer style="background-color: rgb(114, 47, 55); color: white; text-align: center; padding: 20px; margin-bottom:0;">
        <p>&copy; 2026 Winebox. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
