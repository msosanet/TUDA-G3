<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/contacto.css">
    <title>Winebox - Contactos</title>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="img/logo-winebox.png" alt="Logo de Winebox">
            <strong>Winebox</strong>
        </div>
        <div>
            <a href="index.html" title="enlace a inicio">Inicio</a>
            <a href="categoria.html" title="enlace a vinos">Vinos</a>
            <a href="bodega.html" title="enlace a bodegas">Bodegas</a>
            <a href="Contacto.html" title="enlace a contacto">Contacto</a>
        </div>
    </nav>

       <main>
        <div class="imagen-vino">
                <h1>CONTACTO</h1>
                    <p>Los mejores vinos seleccionados para ti</p>
        </div>
        <section id="contacto">
            <div class="contact-card">
                <header class="header">
                
                
                </header>
                <form class="contact-form" method="POST" action="#">
                    <div class="form-group">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" required>

                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    
                        <label for="mensaje">Mensaje:</label>     <!--borre el required-->
                        <textarea id="mensaje" name="mensaje" rows="2"></textarea>
                    </div>

                   
                    <span>Calificar Atención:</span>
                    <div class="form-radios">   
                        <label for="calificar_1"><input type="radio" name="calificar" id="calificar_1" value="1" required>Pésima</label>
                        <label for="calificar_2"><input type="radio" name="calificar" id="calificar_2" value="2">Aceptable</label>
                        <label for="calificar_3"><input type="radio" name="calificar" id="calificar_3" value="3">Buena</label>
                        <label for="calificar_4"><input type="radio" name="calificar" id="calificar_4" value="4">Excelente</label>
                    </div>

                    <button type="submit">Enviar Formulario</button>
                </form>
           </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Winebox. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
